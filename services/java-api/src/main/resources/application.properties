# Spring Boot configuration — intentionally misconfigured for demo
server.port=8081

# Actuator endpoints fully exposed — information disclosure
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.endpoint.env.enabled=true
management.endpoint.beans.enabled=true

# Weak datasource config with hardcoded credentials
spring.datasource.url=jdbc:postgresql://localhost:5432/appdb
spring.datasource.username=admin
spring.datasource.password=password123

# Hibernate auto-creates/drops schema on each start
spring.jpa.hibernate.ddl-auto=create-drop

# Debug logging — verbose output in production
logging.level.root=DEBUG
logging.level.org.springframework=DEBUG
